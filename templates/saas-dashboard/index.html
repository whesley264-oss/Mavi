<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — YourSaaS</title>
  <link rel="stylesheet" href="../../src/css/design-tokens.css">
  <link rel="stylesheet" href="../../src/css/components.css">
  <style>
    .dash-layout { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }
    .dash-sidebar { background: var(--color-ink-soft); border-right: 1px solid var(--color-ink-border); padding: 2rem; }
    .dash-content { padding: 3rem; }
    .dash-header { display: flex; justify-content: space-between; margin-bottom: 3rem; }
  </style>
</head>
<body>
  <div class="dash-layout">
    <aside class="dash-sidebar">
      <div class="nav__logo">Argus<span class="text-accent">.</span></div>
      <nav style="margin-top: 4rem;">
        <ul style="list-style: none; display: flex; flex-direction: column; gap: 1.5rem;">
          <li><a href="#" class="text-muted" style="text-decoration: none;">Dashboard</a></li>
          <li><a href="#" class="text-muted" style="text-decoration: none;">Projects</a></li>
          <li><a href="#" class="text-muted" style="text-decoration: none;">Analytics</a></li>
          <li><a href="#" class="text-muted" style="text-decoration: none;">Settings</a></li>
        </ul>
      </nav>
    </aside>
    <main class="dash-content">
      <header class="dash-header">
        <h1>Overview</h1>
        <div class="btn btn-primary btn-sm">+ New Project</div>
      </header>
      <div class="grid-12">
        <div class="card" style="grid-column: span 4;">
          <span class="text-muted">Active Users</span>
          <div class="display" style="font-size: 2.5rem;" data-counter="12450">0</div>
        </div>
        <div class="card" style="grid-column: span 4;">
          <span class="text-muted">Monthly Revenue</span>
          <div class="display" style="font-size: 2.5rem;" data-counter="84200" data-prefix="$">0</div>
        </div>
        <div class="card" style="grid-column: span 4;">
          <span class="text-muted">Conversion Rate</span>
          <div class="display" style="font-size: 2.5rem;" data-counter="12" data-suffix="%">0</div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script type="module">
    import { initCounters } from '../../src/js/animations/counter.js';
    initCounters();
  </script>
</body>
</html>
