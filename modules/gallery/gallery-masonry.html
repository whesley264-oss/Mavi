<section class="gallery-section" style="padding: var(--space-section) 0;">
  <div class="container">
    <div class="section-header" style="margin-bottom: 4rem;">
      <span class="label">Gallery</span>
      <h2>Nossos Projetos</h2>
    </div>
    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem;">

      <div class="card" style="height: 450px; background: var(--color-ink-soft);" data-reveal="scale"></div>
      <div class="card" style="height: 350px; background: var(--color-ink-muted);" data-reveal="scale"></div>
      <div class="card" style="height: 400px; background: var(--color-ink-soft);" data-reveal="scale"></div>
      <div class="card" style="height: 300px; background: var(--color-ink-muted);" data-reveal="scale"></div>
      <div class="card" style="height: 380px; background: var(--color-ink-soft);" data-reveal="scale"></div>
    </div>
  </div>
</section>
