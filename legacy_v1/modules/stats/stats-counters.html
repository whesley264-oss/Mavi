<section class="stats-section" style="padding: var(--space-section) 0;">
  <div class="container grid-12">
    <div class="card" style="grid-column: span 3; text-align: center;">
      <div class="stat-number" data-counter="500" data-suffix="+">0+</div>
      <div class="text-muted">Projetos</div>
    </div>
    <div class="card" style="grid-column: span 3; text-align: center;">
      <div class="stat-number" data-counter="100" data-suffix="%">0%</div>
      <div class="text-muted">Segurança</div>
    </div>
    <div class="card" style="grid-column: span 3; text-align: center;">
      <div class="stat-number" data-counter="24" data-suffix="/7">0/7</div>
      <div class="text-muted">Suporte</div>
    </div>
    <div class="card" style="grid-column: span 3; text-align: center;">
      <div class="stat-number" data-counter="10" data-suffix="x">0x</div>
      <div class="text-muted">Velocidade</div>
    </div>
  </div>
</section>
