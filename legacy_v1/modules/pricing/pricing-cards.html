<section class="pricing-section" style="padding: var(--space-section) 0;">
  <div class="container">
    <div class="section-header" style="text-align: center; margin-bottom: 4rem;">
      <span class="label">Preços</span>
      <h2>Planos Simples</h2>
    </div>
    <div class="grid-12">
      <div class="card" style="grid-column: span 4;">
        <h3>Starter</h3>
        <div class="display" style="font-size: 3rem;">$49</div>
        <p class="text-muted">Para pequenos projetos.</p>
        <button class="btn btn-outline" style="width: 100%; margin-top: 2rem;">Começar</button>
      </div>
      <div class="card" style="grid-column: span 4; border-color: var(--color-accent);">
        <span class="badge">Popular</span>
        <h3>Pro</h3>
        <div class="display" style="font-size: 3rem;">$99</div>
        <p class="text-muted">Para agências e times.</p>
        <button class="btn btn-primary" style="width: 100%; margin-top: 2rem;">Assinar</button>
      </div>
      <div class="card" style="grid-column: span 4;">
        <h3>Enterprise</h3>
        <div class="display" style="font-size: 3rem;">Custom</div>
        <p class="text-muted">Para grandes empresas.</p>
        <button class="btn btn-outline" style="width: 100%; margin-top: 2rem;">Contato</button>
      </div>
    </div>
  </div>
</section>
